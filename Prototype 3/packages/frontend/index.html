<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@100..900&family=Roboto+Flex:opsz,wght@8..144,400..700&display=swap"
      rel="stylesheet"
    />
    <title>CampOS</title>
  </head>
  <body>
    <script>
      (function() {
        const theme = localStorage.getItem('campos-theme') || 'lavender';
        document.body.classList.add('theme-' + theme);
        
        const mode = localStorage.getItem('campos-mode') || 'dark';
        if (mode === 'auto') {
          const lat = parseFloat(localStorage.getItem('campos-lat')) || 28.628;
          const lon = parseFloat(localStorage.getItem('campos-lon')) || 77.38;
          const now = new Date();
          const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
          const declination = 23.45 * Math.sin((2 * Math.PI * (284 + dayOfYear)) / 365);
          const latRad = (lat * Math.PI) / 180;
          const decRad = (declination * Math.PI) / 180;
          const cosH = -Math.tan(latRad) * Math.tan(decRad);
          let hourAngle = 90;
          if (cosH >= -1 && cosH <= 1) {
            hourAngle = (Math.acos(cosH) * 180) / Math.PI;
          }
          const dayLengthHours = (2 * hourAngle) / 15;
          const timezoneOffset = -now.getTimezoneOffset() / 60;
          const lstm = 15 * timezoneOffset;
          const longitudeCorrection = (lstm - lon) / 15;
          const b = (2 * Math.PI * (dayOfYear - 81)) / 364;
          const eqTime = (9.87 * Math.sin(2 * b) - 7.53 * Math.cos(b) - 1.5 * Math.sin(b)) / 60;
          const solarNoon = 12 + longitudeCorrection - eqTime;
          const sunrise = solarNoon - dayLengthHours / 2;
          const sunset = solarNoon + dayLengthHours / 2;
          const currentHour = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
          const isDaytime = currentHour >= sunrise && currentHour < sunset;
          document.body.classList.add(isDaytime ? 'mode-light' : 'mode-dark');
        } else {
          document.body.classList.add('mode-' + mode);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx?cb=1779822562"></script>
  </body>
</html>
